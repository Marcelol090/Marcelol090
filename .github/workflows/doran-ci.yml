name: Doran CI

on:
  push:
    paths:
      - "doran-vocacional/**"
      - ".github/workflows/doran-ci.yml"
  pull_request:
    paths:
      - "doran-vocacional/**"
      - ".github/workflows/doran-ci.yml"

permissions:
  contents: read

concurrency:
  group: doran-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: doran-vocacional
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Check API syntax and build frontend
        run: npm run check
